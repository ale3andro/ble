<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Car Controller</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #1a1a1a; color: white; 
            text-align: center; margin: 0; padding: 20px;
            user-select: none; 
            touch-action: none; /* Prevents scrolling/zooming while driving */
        }

        #terminal { 
            background: #000; color: #0f0; padding: 10px; height: 60px; 
            overflow-y: auto; border-radius: 8px; font-family: monospace; 
            font-size: 0.8rem; margin-bottom: 15px; border: 1px solid #333; text-align: left;
        }

        .btn-connect {
            width: 100%; max-width: 300px; padding: 15px; border: none;
            background: #28a745; color: white; font-weight: bold;
            border-radius: 10px; margin-bottom: 20px; cursor: pointer;
        }

        .controller-container {
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }

        /* D-PAD Styling */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
            gap: 12px;
        }

        .btn-drive {
            background: #333; color: white; border: none;
            border-radius: 20px; font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px #000; transition: all 0.05s;
        }

        /* Visual "Press" Effect */
        .btn-drive:active {
            box-shadow: 0 0px #000;
            transform: translateY(6px);
            background: #555;
        }

        .up    { grid-column: 2; grid-row: 1; }
        .left  { grid-column: 1; grid-row: 2; }
        .stop  { grid-column: 2; grid-row: 2; background: #dc3545; font-size: 1rem; }
        .right { grid-column: 3; grid-row: 2; }
        .down  { grid-column: 2; grid-row: 3; }

        /* Secondary Actions (T, F, Q, E) */
        .actions { display: flex; gap: 15px; }
        .btn-act {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            color: white; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 4px #000;
        }
        .btn-act:active { transform: translateY(4px); box-shadow: 0 0px #000; }
    </style>
</head>
<body>

    <div id="terminal">System: Ready...</div>
    <button id="connectBtn" class="btn-connect">CONNECT VIA BLUETOOTH</button>

    <div class="controller-container">
        <div class="dpad">
            <button class="btn-drive up" 
                ontouchstart="sendCommand('U')" ontouchend="sendCommand('S')"
                onmousedown="sendCommand('U')" onmouseup="sendCommand('S')">▲</button>
            
            <button class="btn-drive left" 
                ontouchstart="sendCommand('R')" ontouchend="sendCommand('S')"
                onmousedown="sendCommand('R')" onmouseup="sendCommand('S')">◀</button>
            
            <button class="btn-drive stop" onclick="sendCommand('S')">STOP</button>
            
            <button class="btn-drive right" 
                ontouchstart="sendCommand('L')" ontouchend="sendCommand('S')"
                onmousedown="sendCommand('L')" onmouseup="sendCommand('S')">▶</button>
            
            <button class="btn-drive down" 
                ontouchstart="sendCommand('D')" ontouchend="sendCommand('S')"
                onmousedown="sendCommand('D')" onmouseup="sendCommand('S')">▼</button>
        </div>

        <div class="actions">
            <button class="btn-act" style="background:#dc3545" onclick="sendCommand('1')">1</button>
            <button class="btn-act" style="background:#ffc107; color:black" onclick="sendCommand('T')">T</button>
            <button class="btn-act" style="background:#17a2b8" onclick="sendCommand('F')">F</button>
            <button class="btn-act" style="background:#6c757d" onclick="sendCommand('E')">E</button>
            <button class="btn-act" style="background:#dc3545" onclick="sendCommand('Q')">Q</button>
        </div>
    </div>

    <script>
        let device, characteristic;
        const SERVICE_UUID = 0xFFE0; 
        const CHARACTERISTIC_UUID = 0xFFE1;

        const logView = document.getElementById('terminal');
        const connectBtn = document.getElementById('connectBtn');

        function log(msg) {
            const line = document.createElement('div');
            line.textContent = `> ${msg}`;
            logView.appendChild(line);
            logView.scrollTop = logView.scrollHeight;
        }

        connectBtn.addEventListener('click', async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                log("Connected to Car!");
                connectBtn.textContent = "CONNECTED ✅";
            } catch (error) {
                log("Connect Error: " + error.message);
            }
        });

        async function sendCommand(cmd) {
            if (!characteristic) return;
            try {
                const encoder = new TextEncoder();
                // writeValueWithoutResponse is faster for rapid driving commands
                await characteristic.writeValueWithoutResponse(encoder.encode(cmd));
                console.log("Sent: " + cmd);
            } catch (error) {
                console.warn("Send Error: " + error.message);
            }
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.error(err));
        }
    </script>
</body>
</html>
